<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 580" width="900" height="580">
  <defs>
    <filter id="glow" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <path d="M0,0 L10,3.5 L0,7 L2,3.5 Z" fill="#4a9eff"/>
    </marker>
    <marker id="arrGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <path d="M0,0 L10,3.5 L0,7 L2,3.5 Z" fill="#00e676"/>
    </marker>
    <marker id="arrAmber" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <path d="M0,0 L10,3.5 L0,7 L2,3.5 Z" fill="#ff9f43"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="580" rx="12" fill="#0d1117"/>
  <rect x="1" y="1" width="898" height="578" rx="12" fill="none" stroke="#1e3a5f" stroke-width="1" opacity="0.4"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-weight="700" font-size="18" fill="#ffffff" letter-spacing="1">Compiled Decision Graph — Tech Support Triage</text>
  <text x="450" y="58" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="12" fill="#6a8caf">7 states · 15 transitions · 0 LLM calls at runtime</text>

  <!-- ==================== TRIAGE (top center) ==================== -->
  <g transform="translate(450, 110)">
    <rect x="-60" y="-25" width="120" height="50" rx="8" fill="#0d1f35" stroke="#4a9eff" stroke-width="2" filter="url(#glow)"/>
    <text x="0" y="5" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-weight="700" font-size="16" fill="#4a9eff">triage</text>
    <circle cx="-48" cy="-14" r="4" fill="#4a9eff" opacity="0.6"/>
    <text x="-40" y="-10" font-family="'Consolas',monospace" font-size="8" fill="#4a9eff" opacity="0.6">start</text>
  </g>

  <!-- ==================== 3 BRANCHES FROM TRIAGE ==================== -->

  <!-- Left arrow: triage -> awaiting_confirmation -->
  <path d="M400,135 Q300,160 200,185" fill="none" stroke="#4a9eff" stroke-width="1.5" marker-end="url(#arr)" opacity="0.7"/>
  <text x="280" y="152" text-anchor="middle" font-family="'Consolas',monospace" font-size="9" fill="#6a8caf">issue_type = "account"</text>

  <!-- Center arrow: triage -> billing_review -->
  <path d="M450,135 L450,185" fill="none" stroke="#4a9eff" stroke-width="1.5" marker-end="url(#arr)" opacity="0.7"/>
  <text x="520" y="165" text-anchor="start" font-family="'Consolas',monospace" font-size="9" fill="#6a8caf">issue_type = "billing"</text>

  <!-- Right arrow: triage -> incident_detected -->
  <path d="M500,135 Q600,160 700,185" fill="none" stroke="#4a9eff" stroke-width="1.5" marker-end="url(#arr)" opacity="0.7"/>
  <text x="630" y="148" text-anchor="middle" font-family="'Consolas',monospace" font-size="9" fill="#6a8caf">technical + critical</text>

  <!-- ==================== ROW 2: Three intermediate states ==================== -->

  <!-- awaiting_confirmation (left) -->
  <g transform="translate(165, 215)">
    <rect x="-95" y="-25" width="190" height="50" rx="8" fill="#0d1f35" stroke="#4a9eff" stroke-width="1.5"/>
    <text x="0" y="1" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-weight="600" font-size="13" fill="#c9d8e8">awaiting_confirmation</text>
    <text x="0" y="16" text-anchor="middle" font-family="'Consolas',monospace" font-size="9" fill="#4a6a8a">password_reset</text>
  </g>

  <!-- billing_review (center) -->
  <g transform="translate(450, 215)">
    <rect x="-80" y="-25" width="160" height="50" rx="8" fill="#0d1f35" stroke="#4a9eff" stroke-width="1.5"/>
    <text x="0" y="1" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-weight="600" font-size="13" fill="#c9d8e8">billing_review</text>
    <text x="0" y="16" text-anchor="middle" font-family="'Consolas',monospace" font-size="9" fill="#4a6a8a">lookup_billing</text>
  </g>

  <!-- incident_detected (right) -->
  <g transform="translate(735, 215)">
    <rect x="-85" y="-25" width="170" height="50" rx="8" fill="#0d1f35" stroke="#4a9eff" stroke-width="1.5"/>
    <text x="0" y="1" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-weight="600" font-size="13" fill="#c9d8e8">incident_detected</text>
    <text x="0" y="16" text-anchor="middle" font-family="'Consolas',monospace" font-size="9" fill="#4a6a8a">check_system_status</text>
  </g>

  <!-- ==================== ROW 3: refund_issued and monitoring ==================== -->

  <!-- Arrow: awaiting_confirmation -> resolved (direct) -->
  <path d="M165,240 L165,290 Q165,320 200,340 L310,405" fill="none" stroke="#00e676" stroke-width="1.5" marker-end="url(#arrGreen)" opacity="0.6"/>
  <text x="110" y="280" font-family="'Consolas',monospace" font-size="9" fill="#00e676" opacity="0.8">reset_completed</text>
  <text x="110" y="292" font-family="'Consolas',monospace" font-size="9" fill="#6a8caf" opacity="0.6">close_ticket</text>

  <!-- Arrow: billing_review -> refund_issued (left-center) -->
  <path d="M410,240 L340,295" fill="none" stroke="#00e676" stroke-width="1.5" marker-end="url(#arrGreen)" opacity="0.7"/>
  <text x="340" y="262" text-anchor="start" font-family="'Consolas',monospace" font-size="9" fill="#00e676" opacity="0.8">amount &lt;= $100</text>

  <!-- Arrow: billing_review -> resolved (escalate, high amount) -->
  <path d="M450,240 L450,405" fill="none" stroke="#ff9f43" stroke-width="1.5" marker-end="url(#arrAmber)" opacity="0.5" stroke-dasharray="5,3"/>
  <text x="458" y="340" font-family="'Consolas',monospace" font-size="9" fill="#ff9f43" opacity="0.7">amount &gt; $100</text>
  <text x="458" y="352" font-family="'Consolas',monospace" font-size="9" fill="#6a8caf" opacity="0.5">escalate</text>

  <!-- Arrow: incident_detected -> monitoring -->
  <path d="M735,240 L735,295" fill="none" stroke="#4a9eff" stroke-width="1.5" marker-end="url(#arr)" opacity="0.7"/>
  <text x="743" y="272" font-family="'Consolas',monospace" font-size="9" fill="#6a8caf">known_incident</text>

  <!-- refund_issued (left-center) -->
  <g transform="translate(310, 320)">
    <rect x="-70" y="-25" width="140" height="50" rx="8" fill="#0d1f35" stroke="#4a9eff" stroke-width="1.5"/>
    <text x="0" y="1" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-weight="600" font-size="13" fill="#c9d8e8">refund_issued</text>
    <text x="0" y="16" text-anchor="middle" font-family="'Consolas',monospace" font-size="9" fill="#4a6a8a">process_refund</text>
  </g>

  <!-- monitoring (right) -->
  <g transform="translate(735, 320)">
    <rect x="-65" y="-25" width="130" height="50" rx="8" fill="#0d1f35" stroke="#4a9eff" stroke-width="1.5"/>
    <text x="0" y="1" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-weight="600" font-size="13" fill="#c9d8e8">monitoring</text>
    <text x="0" y="16" text-anchor="middle" font-family="'Consolas',monospace" font-size="9" fill="#4a6a8a">notify_incident</text>
  </g>

  <!-- Arrow: refund_issued -> resolved -->
  <path d="M340,345 Q380,390 410,405" fill="none" stroke="#00e676" stroke-width="1.5" marker-end="url(#arrGreen)" opacity="0.7"/>
  <text x="305" y="380" font-family="'Consolas',monospace" font-size="9" fill="#00e676" opacity="0.8">satisfied</text>
  <text x="305" y="392" font-family="'Consolas',monospace" font-size="9" fill="#6a8caf" opacity="0.6">close_ticket</text>

  <!-- Arrow: monitoring -> resolved -->
  <path d="M700,345 Q600,390 530,410" fill="none" stroke="#00e676" stroke-width="1.5" marker-end="url(#arrGreen)" opacity="0.7"/>
  <text x="640" y="380" font-family="'Consolas',monospace" font-size="9" fill="#00e676" opacity="0.8">incident_resolved</text>
  <text x="640" y="392" font-family="'Consolas',monospace" font-size="9" fill="#6a8caf" opacity="0.6">close_ticket</text>

  <!-- ==================== RESOLVED (bottom center) ==================== -->
  <g transform="translate(450, 430)">
    <rect x="-75" y="-25" width="150" height="50" rx="8" fill="#0d1f35" stroke="#00e676" stroke-width="2.5" filter="url(#glow)"/>
    <text x="0" y="5" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-weight="700" font-size="16" fill="#00e676">resolved</text>
    <rect x="42" y="-16" width="28" height="14" rx="3" fill="#00e676" opacity="0.15"/>
    <text x="56" y="-6" text-anchor="middle" font-family="'Consolas',monospace" font-size="8" fill="#00e676" opacity="0.8">end</text>
  </g>

  <!-- ==================== LEGEND ==================== -->
  <g transform="translate(50, 505)">
    <text x="0" y="0" font-family="'Segoe UI',sans-serif" font-weight="600" font-size="12" fill="#6a8caf" letter-spacing="1">LEGEND</text>
    <line x1="0" y1="20" x2="30" y2="20" stroke="#00e676" stroke-width="1.5"/>
    <text x="38" y="24" font-family="'Segoe UI',sans-serif" font-size="11" fill="#8899aa">Happy path (auto-resolved)</text>
    <line x1="0" y1="40" x2="30" y2="40" stroke="#ff9f43" stroke-width="1.5" stroke-dasharray="5,3"/>
    <text x="38" y="44" font-family="'Segoe UI',sans-serif" font-size="11" fill="#8899aa">Escalation to human</text>
    <line x1="0" y1="60" x2="30" y2="60" stroke="#4a9eff" stroke-width="1.5"/>
    <text x="38" y="64" font-family="'Segoe UI',sans-serif" font-size="11" fill="#8899aa">Routing transition</text>
  </g>

  <!-- Stats box -->
  <g transform="translate(500, 500)">
    <rect x="0" y="-8" width="360" height="80" rx="6" fill="#0d1f35" stroke="#1e3a5f" stroke-width="1" opacity="0.6"/>
    <text x="180" y="10" text-anchor="middle" font-family="'Consolas',monospace" font-size="10" fill="#6a8caf" letter-spacing="1">COMPILED FROM 3 LLM-SIMULATED TRACES</text>

    <text x="30" y="36" font-family="'Segoe UI',sans-serif" font-size="24" font-weight="700" fill="#4a9eff">8</text>
    <text x="55" y="36" font-family="'Segoe UI',sans-serif" font-size="11" fill="#8899aa">LLM calls</text>
    <text x="55" y="50" font-family="'Segoe UI',sans-serif" font-size="10" fill="#556677">at compile time</text>

    <line x1="140" y1="22" x2="140" y2="58" stroke="#1e3a5f" stroke-width="1"/>

    <text x="160" y="36" font-family="'Segoe UI',sans-serif" font-size="24" font-weight="700" fill="#00e676">0</text>
    <text x="180" y="36" font-family="'Segoe UI',sans-serif" font-size="11" fill="#8899aa">LLM calls</text>
    <text x="180" y="50" font-family="'Segoe UI',sans-serif" font-size="10" fill="#556677">at runtime</text>

    <line x1="265" y1="22" x2="265" y2="58" stroke="#1e3a5f" stroke-width="1"/>

    <text x="280" y="36" font-family="'Segoe UI',sans-serif" font-size="24" font-weight="700" fill="#ff9f43">5</text>
    <text x="300" y="36" font-family="'Segoe UI',sans-serif" font-size="11" fill="#8899aa">scenarios</text>
    <text x="300" y="50" font-family="'Segoe UI',sans-serif" font-size="10" fill="#556677">run deterministically</text>
  </g>
</svg>